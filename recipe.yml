name: ymy-os
description: YmY OS v43 Beta - Yeni kullanıcılar için hazır Fedora Silverblue
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43

stages:
  - modules:
      - type: rpm-ostree
        repos:
          - https://copr.fedorainfracloud.org/coprs/atim/starship/repo/fedora-%OS_VERSION%/atim-starship-fedora-%OS_VERSION%.repo
        install:
          # GNOME 49 araçları
          - gnome-tweaks
          - gnome-extensions-app
          - dconf-editor
          
          # Yeni kullanıcılar için programlar
          - vlc
          - ffmpeg
          - htop
          - btop
          - neofetch
          - starship
          
          # Dosya sistemi desteği (Fedora 43 güncel paketler)
          - ntfs-3g
          - exfatprogs
          - fuse-exfat
          
          # Sıkıştırma araçları
          - unrar
          - p7zip
          - p7zip-plugins
          - unzip
          - zip
          - tar
          - gzip
          - bzip2
          
          # Temel geliştirme araçları
          - git
          - wget
          - curl
          - nano
          - vim
          
          # Yazı tipleri (Türkçe karakterler için)
          - google-noto-sans-fonts
          - google-noto-serif-fonts
          - google-noto-mono-fonts
          
        remove:
          - gnome-tour
          - gnome-connections

      - type: default-flatpaks
        notify: true
        system:
          install:
            # Tarayıcı
            - org.mozilla.firefox
            
            # Ofis
            - org.libreoffice.LibreOffice
            
            # Multimedya
            - org.gnome.Cheese
            - org.gnome.Shotwell
            - org.gnome.Evince
            - io.github.celluloid_player.Celluloid
            
            # Sistem araçları
            - com.mattjakeman.ExtensionManager
            - org.gnome.Boxes
            - org.gnome.Logs
            - org.gnome.baobab
            
            # Temel uygulamalar
            - org.gnome.Calculator
            - org.gnome.Calendar
            - org.gnome.TextEditor
            - org.gnome.Weather
            - org.gnome.Clocks
            - org.gnome.Contacts
            - org.gnome.Maps
            - org.gnome.Characters

      - type: fonts
        fonts:
          nerd-fonts:
            - FiraCode
            - JetBrainsMono

      - type: files
        files:
          - source: system
            destination: /

      - type: script
        scripts:
          - scripts/setup-gnome.sh
